name: commitlint

# Valida que commits em PRs e na main seguem Conventional Commits.
# Usa cocogitto (cog), o mesmo linter que roda no pre-commit local via lefthook.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cog-check:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # cog precisa de histórico para comparar com a última tag

      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@v3
        with:
          # `check-latest-tag-only: true` falha quando não há tag ainda
          # (caso do primeiro release). Validamos manualmente abaixo.
          check: false

      - name: Check commit messages
        shell: bash
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            echo "Found tag: validating commits since $(git describe --tags --abbrev=0)"
            cog check --from-latest-tag
          else
            echo "No tag yet — skipping cog check for the first release"
          fi
