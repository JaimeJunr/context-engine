name: release

# Configurado para cargo-dist (https://opensource.axo.dev/cargo-dist).
#
# Como liberar uma nova versão:
#   1. Atualizar versão em Cargo.toml e CHANGELOG.md (mover [Unreleased] → [x.y.z]).
#   2. `git tag vX.Y.Z && git push origin vX.Y.Z`
#   3. Este workflow:
#        - constrói binários cross-platform (Linux x86_64/aarch64, macOS x86_64/aarch64, Windows x86_64)
#        - cria GitHub Release com changelog + binários + installers (shell + powershell)
#   4. Workflow publish-crates (separado) faz `cargo publish` em crates.io.

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    paths: [".github/workflows/release.yml", "Cargo.toml"]

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
      - name: Cache cargo-dist
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-dist
          key: cargo-dist-v0.28.0
      - id: plan
        run: |
          cargo dist ${{ !github.event.pull_request && format('plan --tag={0}', github.ref_name) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "manifest=$(jq -c '.' plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  build-binaries:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache target/
        uses: Swatinem/rust-cache@v2
        with:
          key: dist-${{ matrix.target }}
      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install cargo-dist
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell -c "irm https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.ps1 | iex"
          else
            curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
          fi
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo dist build ${{ needs.plan.outputs.tag-flag }} --target=${{ matrix.target }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            target/distrib/*.tar.gz
            target/distrib/*.zip
            target/distrib/*.sh
            target/distrib/*.ps1
            target/distrib/*.json

  publish-release:
    needs: [plan, build-binaries]
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo dist host ${{ needs.plan.outputs.tag-flag }} \
            --steps=upload \
            --steps=release \
            --artifacts=all
